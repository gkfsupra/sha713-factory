name: SHA-713 CORE CI

on:
  push:
    branches: [ main ]

concurrency:
  group: sha713-core
  cancel-in-progress: true

jobs:
  core:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Manifest guard
        run: |
          test -f MANIFEST-713.json || (echo "MISSING MANIFEST" && exit 1)
          echo "MANIFEST OK"

      - name: System pulse
        run: |
          echo "SHA-713 OK"
          echo "CI STABLE SINGLE SOURCE ACTIVE"
