name: SHA-713 Core Stability

on:
  push:
    branches: [ main ]

jobs:
  integrity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Manifest sanity check
        run: |
          echo "Checking manifest..."
          test -f MANIFEST-713.json || (echo "MISSING MANIFEST" && exit 1)
          echo "OK"

      - name: Repo stability pulse
        run: |
          echo "SHA-713 CORE ACTIVE"
          echo "System stable"
